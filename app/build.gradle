    // Lottie
    implementation libs.lottie

    //RecyclerView
    def epoxyVersion = "5.1.4"
    //noinspection UseTomlInstead
    implementation "com.airbnb.android:epoxy:$epoxyVersion"
    //noinspection KaptUsageInsteadOfKsp
    kapt "com.airbnb.android:epoxy-processor:$epoxyVersion"

    //noinspection NewerVersionAvailable
    implementation libs.mmkv
    implementation libs.xxpermission.ktx

    //Immersion bar
    implementation libs.immersionbar
    implementation libs.immersionbar.ktx
    implementation libs.immersionbar.components

    // ExoPlayer (Media3)
    implementation libs.androidx.media3.exoplayer
    implementation libs.androidx.media3.common


    //Testing
    testImplementation libs.junit
    androidTestImplementation libs.androidx.junit
    androidTestImplementation libs.androidx.espresso.core
}

// Extract native libraries from the 'natives' configuration into jniLibs/<abi>/
def nativeClassifierToAbi = [
    'natives-arm64-v8a'   : 'arm64-v8a',
    'natives-armeabi-v7a' : 'armeabi-v7a',
    'natives-x86_64'      : 'x86_64',
    'natives-x86'         : 'x86'
]

tasks.register('copyNatives', Copy) {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    configurations.natives.files.each { jar ->
        def abi = nativeClassifierToAbi.find { jar.name.contains(it.key) }?.value
        if (abi) {
            from(zipTree(jar)) {
                include '*.so'
                into abi
            }
        }
    }
    into file("src/main/jniLibs")
}

tasks.configureEach { task ->
    if (task.name.contains('merge') && (task.name.contains('NativeLibs') || task.name.contains('JniLibFolders'))) {
        task.dependsOn 'copyNatives'
    }
}