    implementation libs.moshi.kotlin
    implementation libs.moshi.adapters

    // Coroutine
    implementation libs.kotlinx.coroutines.core
    implementation libs.kotlinx.coroutines.android

    // Glide
    implementation libs.glide
    ksp libs.compiler

    //Room
    implementation libs.androidx.room.runtime
    ksp libs.androidx.room.compiler
    implementation libs.androidx.room.ktx

    //Logging
    implementation libs.timber

    //Sdp, ssp
    implementation libs.sdp.android
    implementation libs.ssp.android

    //ShapeView
    implementation(libs.shapeview)
    implementation(libs.shapedrawable)

    implementation libs.gson
    implementation libs.utilcodex

    // LibGDX
    implementation libs.gdx
    implementation libs.gdx.backend.android
    implementation libs.gdx.gltf

    // Native libraries – use a custom 'natives' configuration so the .so files
    // get extracted into jniLibs and packaged inside the APK.
    configurations { natives }
    natives(libs.gdx.platform.arm64) { artifact { classifier = 'natives-arm64-v8a' } }
    natives(libs.gdx.platform.armv7) { artifact { classifier = 'natives-armeabi-v7a' } }
    natives(libs.gdx.platform.x86) { artifact { classifier = 'natives-x86' } }
    natives(libs.gdx.platform.x64) { artifact { classifier = 'natives-x86_64' } }

    // RxJava2 (for LockscreenRenderer)
    implementation libs.rxjava2
